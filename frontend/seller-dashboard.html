<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard • SecondHand.ng</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto px-5 py-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold">Seller Dashboard</h1>
                <p class="text-gray-600">Welcome back, Adebayo</p>
            </div>
            <a href="index.html" class="px-6 py-2 border border-gray-300 rounded-2xl text-sm">Back to Marketplace</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white border border-gray-200 rounded-3xl p-6">
                <div class="text-sm text-gray-500">Total Revenue</div>
                <div class="text-4xl font-bold text-[#003087]">₦1.28M</div>
            </div>
            <div class="bg-white border border-gray-200 rounded-3xl p-6">
                <div class="text-sm text-gray-500">Active Listings</div>
                <div class="text-4xl font-bold text-[#003087]">47</div>
            </div>
            <div class="bg-white border border-gray-200 rounded-3xl p-6">
                <div class="text-sm text-gray-500">Pending Orders</div>
                <div class="text-4xl font-bold text-[#003087]">8</div>
            </div>
            <div class="bg-white border border-gray-200 rounded-3xl p-6">
                <div class="text-sm text-gray-500">Avg Rating</div>
                <div class="text-4xl font-bold text-[#003087]">4.9</div>
            </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-3xl p-6">
            <div class="font-bold text-xl mb-6">My Listings</div>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 border border-gray-100 rounded-2xl">
                    <div>iPhone 13 Pro Max 256GB</div>
                    <div class="font-bold">₦285,000</div>
                    <div class="text-xs px-3 py-1 bg-green-100 text-green-700 rounded-full">Active</div>
                </div>
                <div class="flex justify-between items-center p-4 border border-gray-100 rounded-2xl">
                    <div>MacBook Pro 16" M1</div>
                    <div class="font-bold">₦890,000</div>
                    <div class="text-xs px-3 py-1 bg-green-100 text-green-700 rounded-full">Active</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
