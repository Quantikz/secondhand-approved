<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register • SecondHand.ng</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto px-5 py-12">
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-[#00A651] rounded-3xl flex items-center justify-center mb-4">
                <i class="fas fa-user-plus text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold">Create Account</h1>
        </div>

        <div class="bg-white border border-gray-200 rounded-3xl p-7">
            <div class="space-y-4">
                <div><label class="block text-sm font-medium mb-1">Full Name</label><input type="text" id="name" value="Adebayo Okafor" class="w-full border px-4 py-3 rounded-2xl"></div>
                <div><label class="block text-sm font-medium mb-1">Email</label><input type="email" id="email" value="adebayo@email.com" class="w-full border px-4 py-3 rounded-2xl"></div>
                <div><label class="block text-sm font-medium mb-1">Phone</label><input type="tel" id="phone" value="08012345678" class="w-full border px-4 py-3 rounded-2xl"></div>
                <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" id="password" value="demo123" class="w-full border px-4 py-3 rounded-2xl"></div>
                
                <button onclick="register()" class="w-full py-4 bg-[#00A651] text-white font-semibold rounded-2xl mt-4">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        function register() {
            const user = { name: document.getElementById('name').value, email: document.getElementById('email').value };
            localStorage.setItem('sh_user', JSON.stringify(user));
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
