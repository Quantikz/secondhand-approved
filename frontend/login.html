<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • SecondHand.ng</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto px-5 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">Welcome Back</h1>
        </div>

        <div class="bg-white border border-gray-200 rounded-3xl p-7">
            <div class="space-y-4">
                <div><label class="block text-sm font-medium mb-1">Email</label><input type="email" id="email" value="adebayo@email.com" class="w-full border px-4 py-3 rounded-2xl"></div>
                <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" id="password" value="demo123" class="w-full border px-4 py-3 rounded-2xl"></div>
                
                <button onclick="login()" class="w-full py-4 bg-[#00A651] text-white font-semibold rounded-2xl mt-4">Login</button>
            </div>
        </div>
        
        <div class="text-center mt-6 text-sm">Don't have an account? <a href="register.html" class="text-[#00A651] font-semibold">Sign up</a></div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const user = { name: "Adebayo Okafor", email };
            localStorage.setItem('sh_user', JSON.stringify(user));
            window.location.href = 'seller-dashboard.html';
        }
    </script>
</body>
</html>
